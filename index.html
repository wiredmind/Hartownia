<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hartownia">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Hartownia</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
:root{
  --bg:#111111;
  --surface:#202020;
  --surface2:#2A2A2A;
  --border:#383836;
  --gold:#C9A84C;
  --gold-dim:rgba(201,168,76,.15);
  --gold-border:rgba(201,168,76,.25);
  --text:#F2F0EA;
  --muted:#9A9890;
  --subtle:#666660;
  --green:#52A86A;
  --amber:#D4904C;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;font-size:16px;line-height:1.5;}
.app{display:flex;flex-direction:column;height:100dvh;}
.bc{font-family:'Barlow Condensed',system-ui,sans-serif;}

/* HEADER */
.hdr{
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:calc(var(--safe-top) + 14px) 20px 14px;
  flex-shrink:0;
}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.logo{font-family:'Barlow Condensed';font-size:24px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;}
.logo em{color:var(--gold);font-style:normal;}
.sub{font-size:12px;color:var(--muted);margin-top:2px;letter-spacing:.04em;}
.week-ctrl{display:flex;align-items:center;gap:10px;}
.wk-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:none;color:var(--muted);font-size:20px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.wk-btn:active{background:var(--surface2);}
.wk-label{font-family:'Barlow Condensed';font-size:16px;font-weight:700;color:var(--gold);letter-spacing:.06em;text-transform:uppercase;min-width:64px;text-align:center;}
.prog-track{background:var(--surface2);border-radius:2px;height:3px;overflow:hidden;}
.prog-fill{background:var(--gold);height:100%;border-radius:2px;transition:width .3s;}
.prog-meta{display:flex;justify-content:space-between;margin-top:6px;}
.prog-today{font-size:12px;color:var(--muted);}
.prog-phase{font-family:'Barlow Condensed';font-size:12px;font-weight:700;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:11px 4px 9px;cursor:pointer;background:none;border:none;color:var(--muted);font-family:'DM Sans';font-size:11px;font-weight:500;gap:5px;transition:color .15s;}
.nav-btn.active{color:var(--gold);}
.nav-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}

/* TABS */
.tab{display:none;padding:16px 16px 88px;}
.tab.active{display:block;}

/* DAY CARD */
.day-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.day-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;cursor:pointer;}
.day-bar{width:3px;height:38px;border-radius:2px;flex-shrink:0;}
.day-name{font-family:'Barlow Condensed';font-size:22px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;color:var(--text);}
.day-focus{font-size:13px;color:var(--muted);margin-top:2px;}
.day-stat{font-family:'Barlow Condensed';font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.chevron{width:18px;height:18px;stroke:var(--subtle);transition:transform .2s;flex-shrink:0;}
.chevron.open{transform:rotate(180deg);}
.day-body{display:none;border-top:1px solid var(--border);}
.day-body.open{display:block;}

/* EXERCISE ROW */
.ex-row{display:flex;align-items:flex-start;gap:14px;padding:15px 18px;border-bottom:1px solid var(--border);cursor:pointer;}
.ex-row:last-child{border-bottom:none;}
.ex-row:active{background:var(--surface2);}
.cb{width:24px;height:24px;border-radius:6px;border:2px solid #666660;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.cb.done{background:var(--gold);border-color:var(--gold);}
.ex-name{font-weight:600;font-size:16px;color:#F2F0EA;line-height:1.3;}
.ex-rx{font-size:14px;color:#9A9890;margin-top:3px;}
.ex-note{font-size:13px;color:#C9A84C;margin-top:4px;}
.ex-note.warn{color:#D4804C;}

/* SUNDAY */
.sunday-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:10px;}
.sunday-name{font-family:'Barlow Condensed';font-size:22px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;color:var(--subtle);}
.sunday-focus{font-size:13px;color:var(--muted);margin-top:2px;}
.sunday-note{font-size:14px;color:var(--muted);font-style:italic;margin-top:12px;line-height:1.6;}
.sunday-mantra{font-family:'Barlow Condensed';font-size:14px;color:var(--subtle);letter-spacing:.08em;margin-top:6px;}

/* MENTAL REPS */
.mental-box{background:var(--gold-dim);border:1px solid var(--gold-border);border-radius:12px;padding:18px;margin-bottom:10px;}
.mental-title{font-family:'Barlow Condensed';font-size:13px;font-weight:700;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px;}
.mental-item{display:flex;gap:10px;font-size:14px;color:#A8A49C;line-height:1.55;margin-bottom:8px;}
.mental-item:last-child{margin-bottom:0;}
.mental-arrow{color:var(--gold);flex-shrink:0;font-weight:600;}

/* EXERCISES TAB */
.shoulder-box{background:rgba(212,144,76,.08);border:1px solid rgba(212,144,76,.22);border-radius:12px;padding:18px;margin-bottom:20px;}
.shoulder-title{font-family:'Barlow Condensed';font-size:14px;font-weight:700;color:var(--amber);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}
.shoulder-item{display:flex;gap:10px;font-size:14px;color:#A08060;line-height:1.55;margin-bottom:7px;}
.shoulder-item:last-child{margin-bottom:0;}

.ex-group{margin-bottom:20px;}
.ex-group-label{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;padding:0 2px;}
.ex-group-pip{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.ref-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.ref-row{border-bottom:1px solid var(--border);cursor:pointer;}
.ref-row:last-child{border-bottom:none;}
.ref-row:active{background:var(--surface2);}
.ref-row-hdr{display:flex;align-items:flex-start;gap:12px;padding:15px 18px;}
.icon-wrap{width:34px;height:34px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.tip-chevron{width:16px;height:16px;stroke:var(--subtle);flex-shrink:0;margin-top:5px;transition:transform .2s;}

/* TIP PANEL */
.tip-panel{display:none;background:var(--surface2);border-top:1px solid var(--border);padding:16px 18px 18px;}
.tip-how{font-size:14px;color:#B8B4AC;line-height:1.7;margin-bottom:14px;}
.tip-cues{margin-bottom:14px;display:flex;flex-direction:column;gap:8px;}
.tip-cue{display:flex;gap:10px;font-size:14px;color:var(--muted);line-height:1.5;}
.tip-cue-mark{color:var(--gold);font-weight:600;flex-shrink:0;}
.tip-warn{background:rgba(212,144,76,.08);border:1px solid rgba(212,144,76,.2);border-radius:8px;padding:12px 14px;font-size:13px;color:#B09060;line-height:1.65;}

/* PROGRESSION TABLE */
.prog-table{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-top:-4px;}
.prog-table-hdr{padding:14px 18px;border-bottom:1px solid var(--border);}
.prog-table-title{font-family:'Barlow Condensed';font-size:14px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}
.prog-table-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:14px 18px;border-bottom:1px solid var(--border);}
.prog-table-row:last-child{border-bottom:none;}
.prog-wk-name{font-weight:600;font-size:15px;color:var(--text);}
.prog-badge{font-family:'Barlow Condensed';font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:.06em;text-transform:uppercase;margin-left:8px;}
.prog-desc{font-size:13px;color:var(--muted);text-align:right;line-height:1.5;}

/* PROGRESS TAB */
.section-title{font-family:'Barlow Condensed';font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;padding:0 2px;}
.wk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;}
.wk-cell{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 12px;text-align:center;}
.wk-cell.cur{border-color:var(--gold);}
.wk-big{font-family:'Barlow Condensed';font-size:32px;font-weight:800;line-height:1;color:var(--subtle);}
.wk-big.cur{color:var(--gold);}
.wk-phase-lbl{font-size:11px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.06em;}
.wk-mini-bar{height:2px;background:var(--surface2);border-radius:1px;margin:8px 0 4px;overflow:hidden;}
.wk-mini-fill{height:100%;background:var(--gold);border-radius:1px;}
.wk-pct-lbl{font-size:11px;color:var(--muted);}

.tl-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px;}
.tl-row{display:flex;gap:14px;padding:16px 18px;border-bottom:1px solid var(--border);}
.tl-row:last-child{border-bottom:none;}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:6px;}
.tl-label{font-weight:600;font-size:15px;color:var(--text);flex:1;min-width:0;}
.tl-date{font-family:'Barlow Condensed';font-size:14px;font-weight:700;letter-spacing:.05em;flex-shrink:0;white-space:nowrap;}
.tl-detail{font-size:14px;color:var(--muted);margin-top:4px;line-height:1.55;}

.pb-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px;}
.pb-card-hdr{padding:14px 18px;border-bottom:1px solid var(--border);}
.pb-card-title{font-family:'Barlow Condensed';font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}
.pb-body{padding:16px 18px;display:flex;flex-direction:column;gap:14px;}
.pb-row{display:flex;justify-content:space-between;align-items:baseline;gap:16px;}
.pb-lbl{font-size:14px;color:var(--muted);}
.pb-val{font-size:15px;color:var(--text);font-weight:500;text-align:right;}

.note-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;}
.note-title{font-weight:600;font-size:15px;color:var(--text);margin-bottom:6px;}
.note-body{font-size:14px;color:var(--muted);line-height:1.65;}

/* TOAST */
.toast{position:fixed;top:calc(var(--safe-top) + 64px);left:50%;transform:translateX(-50%) translateY(-70px);background:var(--gold);color:#111;font-family:'Barlow Condensed';font-size:16px;font-weight:700;letter-spacing:.08em;padding:9px 20px;border-radius:999px;z-index:200;transition:transform .2s;white-space:nowrap;pointer-events:none;}
</style>
</head>
<body>
<div class="app">

<header class="hdr">
  <div class="hdr-top">
    <div>
      <div class="logo bc">HART<em>OWNIA</em></div>
      <div class="sub">COTA 2026 · Marcin W.</div>
    </div>
    <div class="week-ctrl">
      <button class="wk-btn" onclick="changeWeek(-1)">&#8249;</button>
      <div class="wk-label bc" id="wkLabel">WEEK 1</div>
      <button class="wk-btn" onclick="changeWeek(1)">&#8250;</button>
    </div>
  </div>
  <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <div class="prog-meta">
    <span class="prog-today" id="progToday"></span>
    <span class="prog-phase bc" id="progPhase"></span>
  </div>
</header>

<div class="scroll-area" id="scrollArea">
  <div id="tab-schedule" class="tab active"></div>
  <div id="tab-exercises" class="tab"></div>
  <div id="tab-progress" class="tab"></div>
</div>

<nav class="nav">
  <button class="nav-btn active" id="nb-schedule" onclick="switchTab('schedule')">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Schedule
  </button>
  <button class="nav-btn" id="nb-exercises" onclick="switchTab('exercises')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
    Exercises
  </button>
  <button class="nav-btn" id="nb-progress" onclick="switchTab('progress')">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Progress
  </button>
</nav>
</div>

<div class="toast" id="toast"></div>

<script>
const EX_TIPS={
  pushups:{how:'High plank, hands just outside shoulder width. Lower chest to the floor keeping elbows at 45° — not flared wide. Full lockout at the top. Don\'t let hips sag or pike.',cues:['Elbows track at 45°, not 90°','Chest touches floor, not chin','Body is one rigid plank throughout'],warn:'Shoulder: if you feel impingement, narrow grip slightly and keep shoulder blades retracted. Stop immediately at pain — not soreness, pain.'},
  pike:{how:'Hips high in an inverted V. Lower your head toward the floor between your hands, then press back up. Loads the front deltoid with less rotator cuff stress than flat push-ups.',cues:['Hips stay high throughout','Head travels in a straight line down','Press back to full lockout'],warn:'Good shoulder substitute when flat push-ups hurt. If this also hurts, skip both and just do band work.'},
  pullap:{how:'Hold a resistance band at shoulder height, arms straight out in front. Pull apart horizontally until arms are fully extended to each side. Slow and controlled — squeeze the shoulder blades together at end range.',cues:['Arms stay straight throughout','Squeeze shoulder blades hard at end','2 seconds out, 2 seconds back'],warn:'Most important exercise for your shoulder. The contraction at end range is everything — don\'t rush it.'},
  grip:{how:'Throw a towel over a pull-up bar, grip both ends, dead hang. Forearms, hands, and fingers working hard. If it gets easy, work toward single-arm or thicker towels.',cues:['Full dead hang — don\'t cheat by pulling','Grip as tight as possible','Breathe steadily'],warn:'Relevant for sustained braking grip on long sessions. By lap 25 your hands will thank you.'},
  wrist:{how:'Extend arm, rotate wrist through full range — palm up to palm down and back. Add slow circles. Use a light dumbbell to add resistance. Both directions, both wrists.',cues:['Full range of motion — don\'t shortcut','Slow and deliberate, not fast','Include circles in both directions'],warn:'Keeps the forearms supple for braking grip. Stiff wrists transfer tension up into the shoulder.'},
  squat:{how:'Feet shoulder-width, toes slightly out. Sit back and down, keep chest up, knees track over toes. Full depth if mobility allows. Drive through the whole foot on the way up.',cues:['Chest stays up — don\'t fold forward','Knees push out, track over toes','Full depth — thighs parallel or below'],warn:'If your heels rise, work on ankle mobility or use a slight heel elevation until it improves.'},
  wsite:{how:'Back flat against wall, thighs parallel to floor, 90° at the knee. Arms crossed or resting on thighs. Keep the lower back pressed into the wall — don\'t let it arch away.',cues:['Lower back glued to wall','Thighs parallel to floor — not higher','Breathe steadily through the burn'],warn:'The sustained quad load is exactly what stabilizes you through long corners. One of the most track-specific exercises here.'},
  lunge:{how:'Step forward, lower back knee toward floor without touching. Push through the front heel to return. Keep torso upright. Alternate legs or complete all reps one side then switch.',cues:['Front shin stays vertical','Torso upright — don\'t lean forward','Control the descent, don\'t drop'],warn:null},
  calf:{how:'Stand on the edge of a step for full range. Rise onto toes, pause at the top, lower slowly past neutral. The controlled lowering is where the real work happens.',cues:['Pause 1 second at the top','Lower slowly — 3 seconds down','Full range: stretch at the bottom'],warn:'Relevant for peg feel and brake modulation. Weak calves mean imprecise footwork.'},
  neck:{how:'Place hand against forehead. Push head into hand while hand resists — nothing moves. Hold 10 seconds. Repeat for back of head, then both sides. Four directions, 3 rounds.',cues:['Maximum effort push against the hand','Nothing should move — isometric','4 directions: front, back, left, right'],warn:'Non-negotiable. Do this watching TV — no gym needed. The Tuono at speed will fatigue a weak neck by session 3 and you\'ll start making mistakes.'},
  pullup:{how:'Dead hang start, full lockout at the bottom. Pull until chin clears the bar. Don\'t kip. If you can\'t do a full rep, jump to the top and lower yourself as slowly as possible — negatives build the same strength.',cues:['Full dead hang between reps','Chin clearly over the bar at the top','Shoulders down and back — don\'t shrug'],warn:'Negatives: jump to top position, lower over 5 seconds. Far more productive than half-reps or assisted work.'},
  invrow:{how:'Set a bar at waist height. Hang underneath with straight body, feet on floor. Pull chest to bar, squeeze shoulder blades at the top. The more horizontal your body, the harder it gets.',cues:['Body stays straight — don\'t pike hips','Pull until chest touches the bar','Squeeze shoulder blades together at top'],warn:'Use instead of pull-ups while rebuilding. Adjust difficulty by walking feet closer (easier) or further (harder) from the bar.'},
  facep:{how:'Anchor band at face height. Pull toward your face, elbows high and wide, externally rotate so hands finish behind ears. Targets rear deltoid and rotator cuff.',cues:['Elbows high and wide — not dropping','External rotation at the end: hands behind ears','Slow and controlled — feel the rear delt'],warn:'This reverses all the pressing damage. The external rotation at end range is the whole point — don\'t skip it.'},
  plank:{how:'Forearms or hands on the floor, body in a straight line from head to heels. Don\'t let hips rise or sag. Breathe. Squeeze glutes and quads to help maintain position.',cues:['Hips level — not a tent, not a hammock','Squeeze glutes and core simultaneously','Breathe — don\'t hold your breath'],warn:'If form breaks down before time is up, stop and rest. A 20-second perfect plank beats a 45-second sloppy one.'},
  sidepl:{how:'On one forearm, body straight, hips up. Don\'t let the hip sag toward the floor. Keep a straight line from head to feet. Progress by raising the top leg.',cues:['Hip stays elevated — don\'t sag','Body in one straight line','Look straight ahead, don\'t crane the neck'],warn:'Builds lateral stability that keeps you anchored on the bike through cambered corners and direction changes.'},
  deadbg:{how:'Lie on back, arms pointing to ceiling, knees bent 90° in the air. Slowly lower opposite arm and leg toward the floor without letting your lower back arch. Return and repeat other side.',cues:['Lower back stays glued to floor — this is everything','Move arm and leg simultaneously','Slow and controlled — 3 seconds down'],warn:'If your lower back arches before limbs reach the floor, only lower as far as you can maintain contact. Range will improve over weeks.'},
  slsqt:{how:'Stand on one leg in front of a chair. Lower slowly until you just touch the seat, then drive back up through the whole foot. The other leg floats forward. Control the descent — don\'t fall onto the chair.',cues:['Touch the chair lightly — don\'t sit','Drive through the whole foot on the way up','Keep the floating leg from touching down'],warn:'Builds the asymmetric leg strength you use when weighting the pegs independently through a corner.'},
  brdge:{how:'Lie on back, knees bent, feet flat. Drive hips to the ceiling, squeeze glutes hard at the top. Hold 2 seconds. Lower with control. Core braced throughout. Add a band above the knees for more activation.',cues:['Squeeze glutes hard at the top — hold 2 seconds','Core braced — don\'t let ribs flare','Drive through the heels, not the toes'],warn:'Hip stability supports tank grip and body positioning. Weak glutes mean you\'re holding yourself on the bars — the opposite of what you want.'},
  farmr:{how:'Pick up something heavy in each hand. Walk with it. Shoulders back, core tight, don\'t let the weight pull you sideways.',cues:['Shoulders back and down — don\'t shrug','Core tight — don\'t let spine twist','Deliberate steps, controlled pace'],warn:'Grip and core simultaneously. Use the heaviest thing you have that lets you maintain posture.'},
  zone2:{how:'Run, bike, or any sustained cardio at a pace where you could hold a conversation but wouldn\'t want to sing. Heart rate roughly 120–140 bpm. Not intervals — steady state.',cues:['Conversational pace — not gasping','Consistent effort throughout','Bike is best: body position is closest to riding'],warn:'Aerobic base work. Going harder is counterproductive. The goal is time in zone. Add 5 minutes each week.'},
  rope:{how:'Basic two-foot jump to start. Once comfortable: alternate feet, high knees, or double-unders. Keep a light bounce, stay on the balls of your feet.',cues:['Light bounce — minimal height','Stay on balls of feet throughout','Elbows in, wrists do the rotation'],warn:'Alternative to zone 2. Also trains coordination and foot quickness which transfers to smooth peg work.'},
  lzone2:{how:'Same as Wednesday but longer. A bicycle is the best option — similar body position to the bike, loading the same postural muscles. Run if that\'s what you have.',cues:['Conversational pace throughout','Add 5 minutes each week','Same effort, longer duration'],warn:'By week 6 you should be at 45 minutes. This builds the stamina to stay sharp on lap 30 the way you were on lap 1.'},
  pullap2:{how:'Same as Monday. Second band session doubles the posterior shoulder work. Same form — slow, controlled, full range, squeeze at end.',cues:['Same form as Monday','Control the return — don\'t let band snap back','Feel the rear delt, not the traps'],warn:'Two sessions per week is the minimum for meaningful shoulder rebalancing alongside the push work.'},
  neck2:{how:'Same as Tuesday. Hand against head, push and resist in all four directions. Nothing moves. Four directions, three rounds, ten seconds each.',cues:['Maximum effort each direction','Reset completely between directions','Don\'t rush the 10 seconds'],warn:'Second neck session this week. By week 4 you should notice a difference holding position under hard braking.'},
};

const EX_ICONS={pushups:'arrow-down-to-line',pike:'triangle',pullap:'move-horizontal',grip:'grip-horizontal',wrist:'rotate-cw',squat:'chevrons-down',wsite:'square',lunge:'footprints',calf:'arrow-up-from-line',neck:'shield',zone2:'heart-pulse',rope:'zap',pullup:'arrow-up-to-line',invrow:'flip-vertical-2',facep:'target',plank:'minus',sidepl:'align-left',deadbg:'bug',slsqt:'flag',brdge:'chevron-up',farmr:'briefcase',pullap2:'move-horizontal',neck2:'shield',lzone2:'heart-pulse'};

const DAYS=[
  {id:'mon',name:'Monday',focus:'Push · Grip · Shoulder',color:'#C9A84C',exercises:[
    {id:'pushups',name:'Push-ups',rx:'3 × 10 (every other day)',note:'⚠ Left shoulder — stop at any pain. Not daily.',warn:true},
    {id:'pike',name:'Pike Push-ups',rx:'3 × 10',note:'Shifts load off the shoulder'},
    {id:'pullap',name:'Band Pull-Aparts',rx:'3 × 15',note:'Counteracts pushing imbalance'},
    {id:'grip',name:'Towel Hang',rx:'3 × 30s per hand'},
    {id:'wrist',name:'Wrist Rotations',rx:'3 × 15 each direction'},
  ]},
  {id:'tue',name:'Tuesday',focus:'Legs · Neck',color:'#5B8DD9',exercises:[
    {id:'squat',name:'Bodyweight Squats',rx:'3 × 20'},
    {id:'wsite',name:'Wall Sit',rx:'3 × 45s'},
    {id:'lunge',name:'Lunges',rx:'3 × 12 per leg'},
    {id:'calf',name:'Calf Raises',rx:'3 × 25'},
    {id:'neck',name:'Neck Isometrics',rx:'3 × 10s × 4 directions',note:'Non-negotiable'},
  ]},
  {id:'wed',name:'Wednesday',focus:'Conditioning',color:'#52A86A',exercises:[
    {id:'zone2',name:'Zone 2 Cardio',rx:'20–30 min',note:'Conversational pace only'},
    {id:'rope',name:'Jump Rope',rx:'15 min',note:'Alternative to cardio'},
  ]},
  {id:'thu',name:'Thursday',focus:'Pull · Core',color:'#9B7FD4',exercises:[
    {id:'pullup',name:'Pull-ups',rx:'3 × max'},
    {id:'invrow',name:'Inverted Rows',rx:'3 × 12',note:'If pull-ups are still rough'},
    {id:'facep',name:'Face Pulls (band)',rx:'3 × 15',note:'Builds posterior shoulder'},
    {id:'plank',name:'Plank',rx:'3 × 45s'},
    {id:'sidepl',name:'Side Plank',rx:'3 × 30s per side'},
    {id:'deadbg',name:'Dead Bug',rx:'3 × 10',note:'Core stability under braking'},
  ]},
  {id:'fri',name:'Friday',focus:'Legs · Grip · Neck',color:'#D4904C',exercises:[
    {id:'slsqt',name:'Single-leg Squat',rx:'3 × 8 per leg',note:'To a chair'},
    {id:'brdge',name:'Glute Bridge',rx:'3 × 15',note:'Hip stability for tank grip'},
    {id:'farmr',name:'Farmer Carry',rx:'3 × 30s',note:'Grip + core simultaneously'},
    {id:'pullap2',name:'Band Pull-Aparts',rx:'3 × 15',note:'Second band session'},
    {id:'neck2',name:'Neck Isometrics',rx:'3 × 10s × 4 directions'},
  ]},
  {id:'sat',name:'Saturday',focus:'Long Conditioning',color:'#5B9FBF',exercises:[
    {id:'lzone2',name:'Zone 2 Cardio',rx:'30–45 min',note:'Add 5 min each week'},
  ]},
];

const TRACK_EVENTS=[
  {date:'May 2',label:'PTD — 1-on-1 Coaching',detail:'Give coach full context upfront: T16–18 line, T11 brake marker, T19, drive out. Cornerstone day.',next:true},
  {date:'Jul 26',label:'PTD — Consolidation',detail:'Implement May coaching. Hunt consistency, not peak times. Gym day.',next:false},
  {date:'Aug 2',label:'RideSmart — Eval Day',detail:'Request eval. Arrive warmed up. This is the comp day.',next:false},
  {date:'Aug 9',label:'PTD — Implement',detail:'Take RS feedback, apply immediately. Back-to-back with eval week.',next:false},
];
const PHASES=['','Build','Build','Load','Load','Peak','Peak'];

let currentWeek=parseInt(localStorage.getItem('tdp_week')||'1');
function key(w,d,e){return'tdp_w'+w+'_'+d+'_'+e;}
function isChecked(w,d,e){return localStorage.getItem(key(w,d,e))==='1';}
function setChecked(w,d,e,v){localStorage.setItem(key(w,d,e),v?'1':'0');}
function weekStats(w){let done=0,total=0;DAYS.forEach(d=>d.exercises.forEach(e=>{total++;if(isChecked(w,d.id,e.id))done++;}));return{done,total,pct:total?Math.round(done/total*100):0};}

function updateHeader(){
  document.getElementById('wkLabel').textContent='WEEK '+currentWeek;
  const s=weekStats(currentWeek);
  document.getElementById('progFill').style.width=s.pct+'%';
  const days=['sun','mon','tue','wed','thu','fri','sat'];
  const today=DAYS.find(d=>d.id===days[new Date().getDay()]);
  if(today){let done=0;today.exercises.forEach(e=>{if(isChecked(currentWeek,today.id,e.id))done++;});document.getElementById('progToday').textContent=done+' / '+today.exercises.length+' today · '+today.name;}
  document.getElementById('progPhase').textContent=PHASES[currentWeek]||'';
}

function changeWeek(d){const nw=Math.max(1,Math.min(6,currentWeek+d));if(nw===currentWeek)return;currentWeek=nw;localStorage.setItem('tdp_week',nw);renderSchedule();renderProgress();updateHeader();}
function toggleDay(id){document.getElementById('body_'+id).classList.toggle('open');document.getElementById('chev_'+id).classList.toggle('open');}

function toggleEx(dayId,exId){
  const was=isChecked(currentWeek,dayId,exId);
  setChecked(currentWeek,dayId,exId,!was);
  const cb=document.getElementById('cb_'+dayId+'_'+exId);
  if(!was){cb.classList.add('done');cb.innerHTML='<svg width="13" height="13" fill="none" stroke="#111" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';}
  else{cb.classList.remove('done');cb.innerHTML='';}
  updateHeader();updateDayStat(dayId);
  if(!was)showToast('DONE ✓');
}

function updateDayStat(dayId){
  const day=DAYS.find(d=>d.id===dayId);
  let done=0;day.exercises.forEach(e=>{if(isChecked(currentWeek,dayId,e.id))done++;});
  const el=document.getElementById('stat_'+dayId);if(!el)return;
  const all=done===day.exercises.length;
  el.textContent=all?'COMPLETE':done+' / '+day.exercises.length;
  el.style.color=all?'#52A86A':'#555550';
}

function renderSchedule(){
  const el=document.getElementById('tab-schedule');
  let h='';
  DAYS.forEach(day=>{
    let done=0;day.exercises.forEach(e=>{if(isChecked(currentWeek,day.id,e.id))done++;});
    const all=done===day.exercises.length;
    h+='<div class="day-card">';
    h+='<div class="day-card-hdr" onclick="toggleDay(\''+day.id+'\')">';
    h+='<div style="display:flex;align-items:center;gap:14px;">';
    h+='<div class="day-bar" style="background:'+day.color+'"></div>';
    h+='<div><div class="day-name bc">'+day.name+'</div><div class="day-focus">'+day.focus+'</div></div></div>';
    h+='<div style="display:flex;align-items:center;gap:12px;">';
    h+='<span id="stat_'+day.id+'" class="day-stat bc" style="color:'+(all?'#52A86A':'#555550')+'">'+(all?'COMPLETE':done+' / '+day.exercises.length)+'</span>';
    h+='<svg id="chev_'+day.id+'" class="chevron" fill="none" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div></div>';
    h+='<div id="body_'+day.id+'" class="day-body">';
    day.exercises.forEach(ex=>{
      const checked=isChecked(currentWeek,day.id,ex.id);
      h+='<div class="ex-row" onclick="toggleEx(\''+day.id+'\',\''+ex.id+'\')">';
      h+='<div id="cb_'+day.id+'_'+ex.id+'" class="cb'+(checked?' done':'')+'">';
      h+=checked?'<svg width="13" height="13" fill="none" stroke="#111" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>':'';
      h+='</div><div style="flex:1"><div class="ex-name">'+ex.name+'</div>';
      h+='<div class="ex-rx">'+ex.rx+'</div>';
      if(ex.note)h+='<div class="ex-note'+(ex.warn?' warn':'')+'">'+ex.note+'</div>';
      h+='</div></div>';
    });
    h+='</div></div>';
  });
  h+='<div class="sunday-card">';
  h+='<div style="display:flex;align-items:center;gap:14px;">';
  h+='<div class="day-bar" style="background:#2E2E2E"></div>';
  h+='<div><div class="day-name bc" style="color:#444">Sunday</div><div class="day-focus">Rest · Light Walk</div></div></div>';
  h+='<div class="sunday-note">Visualize T16–18 arc. Listen for the minimum speed point.</div>';
  h+='<div class="sunday-mantra bc">baaaaa · uuuuuuhuuu · baaaaa</div></div>';
  h+='<div class="mental-box">';
  h+='<div class="mental-title bc">On-Track Mental Reps</div>';
  ['T16–18: drift first kink, commit second apex, then drive to bridge',
   'T19: refuse to brake for one full session — find out what happens',
   'T11: brake marker one bike length deeper than where you\'ve been',
   'Every corner: hear the floor — baaaaa · uuuuuuhuuu · baaaaa',
   'Drive out: load the rear, wait for the bite before full throttle',
   'T12: you already own it — use it as your reference for minimum speed',
   'T1: you\'re consistent here — stay deliberate, don\'t coast on confidence',
   'The S complex: link T3–5 as one arc, stop treating each kink separately',
   'Traffic: outside passing only — patience is pace, not a compromise',
   'Eval day: arrive warmed up, not on a hot lap. Let the session build'].forEach(n=>{
    h+='<div class="mental-item"><span class="mental-arrow">→</span><span>'+n+'</span></div>';
  });
  h+='</div>';
  el.innerHTML=h;
}

function toggleTip(id){
  const el=document.getElementById('tip_'+id);
  const ch=document.getElementById('tipchev_'+id);
  if(!el)return;
  const open=el.style.display==='none'||!el.style.display;
  el.style.display=open?'block':'none';
  if(ch)ch.style.transform=open?'rotate(180deg)':'';
}

function renderExercises(){
  const el=document.getElementById('tab-exercises');
  let h='';
  h+='<div class="shoulder-box">';
  h+='<div class="shoulder-title bc">⚠ Shoulder Protocol</div>';
  ['Push-ups <strong>every other day maximum</strong> — not daily',
   'Start at 3×10, not 3×max',
   'Band pull-aparts (Mon + Fri) counteract anterior dominance',
   'Face pulls (Thu) build posterior shoulder balance',
   'Any pain = stop that session. No heroics.',
   'Week before each track day: cut all volume 50%'].forEach(t=>{
    h+='<div class="shoulder-item"><span style="color:var(--amber);flex-shrink:0">·</span><span>'+t+'</span></div>';
  });
  h+='</div>';
  DAYS.forEach(day=>{
    h+='<div class="ex-group">';
    h+='<div class="ex-group-label"><div class="ex-group-pip" style="background:'+day.color+'"></div>'+day.name+' · '+day.focus+'</div>';
    h+='<div class="ref-card">';
    day.exercises.forEach(ex=>{
      const icon=EX_ICONS[ex.id]||'circle';
      const tips=EX_TIPS[ex.id];
      h+='<div class="ref-row" onclick="toggleTip(\''+ex.id+'_'+day.id+'\')">';
      h+='<div class="ref-row-hdr">';
      h+='<div class="icon-wrap"><i data-lucide="'+icon+'" style="width:16px;height:16px;color:'+day.color+'"></i></div>';
      h+='<div style="flex:1"><div class="ex-name">'+ex.name+'</div>';
      h+='<div class="ex-rx">'+ex.rx+'</div>';
      if(ex.note)h+='<div class="ex-note">'+ex.note+'</div>';
      h+='</div>';
      if(tips)h+='<svg id="tipchev_'+ex.id+'_'+day.id+'" class="tip-chevron" fill="none" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>';
      h+='</div>';
      if(tips){
        h+='<div id="tip_'+ex.id+'_'+day.id+'" class="tip-panel">';
        h+='<p class="tip-how">'+tips.how+'</p>';
        h+='<div class="tip-cues">';
        tips.cues.forEach(c=>h+='<div class="tip-cue"><span class="tip-cue-mark">✓</span><span>'+c+'</span></div>');
        h+='</div>';
        if(tips.warn)h+='<div class="tip-warn">'+tips.warn+'</div>';
        h+='</div>';
      }
      h+='</div>';
    });
    h+='</div></div>';
  });
  h+='<div class="prog-table">';
  h+='<div class="prog-table-hdr"><div class="prog-table-title bc">6-Week Progression</div></div>';
  [['Weeks 1–2','Build','rgba(91,141,217,.15)','#5B8DD9','3 sets · RPE 7 · 90s rest'],
   ['Weeks 3–4','Load','rgba(201,168,76,.15)','#C9A84C','4 sets · RPE 8 · 60s rest'],
   ['Weeks 5–6','Peak','rgba(212,144,76,.15)','#D4904C','4 sets · RPE 9 · vest if available · 45s rest'],
   ['Deload','','','#555','Week before each track day · 50% volume']].forEach(r=>{
    h+='<div class="prog-table-row">';
    h+='<div style="flex-shrink:0"><span class="prog-wk-name">'+r[0]+'</span>';
    if(r[1])h+='<span class="prog-badge bc" style="background:'+r[2]+';color:'+r[3]+'">'+r[1]+'</span>';
    h+='</div><div class="prog-desc">'+r[4]+'</div></div>';
  });
  h+='</div>';
  el.innerHTML=h;
  if(window.lucide)lucide.createIcons();
}

function renderProgress(){
  const el=document.getElementById('tab-progress');
  let h='';
  h+='<div class="section-title bc">6-Week Overview</div>';
  h+='<div class="wk-grid">';
  for(let w=1;w<=6;w++){
    const s=weekStats(w);const isCur=w===currentWeek;
    h+='<div class="wk-cell'+(isCur?' cur':'')+'">';
    h+='<div class="wk-big bc'+(isCur?' cur':'')+'">'+w+'</div>';
    h+='<div class="wk-phase-lbl">'+(PHASES[w]||'')+'</div>';
    h+='<div class="wk-mini-bar"><div class="wk-mini-fill" style="width:'+s.pct+'%"></div></div>';
    h+='<div class="wk-pct-lbl">'+s.pct+'%</div></div>';
  }
  h+='</div>';
  h+='<div class="section-title bc">Season Timeline</div>';
  h+='<div class="tl-card">';
  TRACK_EVENTS.forEach(e=>{
    const dotStyle=e.next
      ?'background:#C9A84C;box-shadow:0 0 0 3px rgba(201,168,76,.2)'
      :'background:#2E2E2E';
    h+='<div class="tl-row">';
    h+='<div class="tl-dot" style="'+dotStyle+'"></div>';
    h+='<div style="flex:1"><div style="display:flex;align-items:baseline;justify-content:space-between;gap:12px">';
    h+='<span class="tl-label">'+e.label+'</span>';
    h+='<span class="tl-date bc" style="color:'+(e.next?'#C9A84C':'#444')+'">'+e.date+'</span></div>';
    h+='<div class="tl-detail">'+e.detail+'</div></div></div>';
  });
  h+='</div>';
  h+='<div class="section-title bc">Personal Bests</div>';
  h+='<div class="pb-card"><div class="pb-card-hdr"><div class="pb-card-title bc">Marcin W. · Aprilia Tuono V4 · COTA</div></div>';
  h+='<div class="pb-body">';
  h+='<div class="pb-row"><span class="pb-lbl">Current PB</span><span style="font-family:\'Barlow Condensed\';font-size:32px;font-weight:800;color:#C9A84C;letter-spacing:.04em">2:48.2</span></div>';
  h+='<div class="pb-row"><span class="pb-lbl">Previous</span><span style="font-family:\'Barlow Condensed\';font-size:24px;font-weight:700;color:#333;letter-spacing:.04em">2:51.3</span></div>';
  h+='<div class="pb-row"><span class="pb-lbl">Improvement</span><span style="font-size:15px;font-weight:600;color:#52A86A">−3.1 seconds</span></div>';
  [['Group','Intermediate · 6 days at COTA'],['Tires','Pirelli Diablo Corsa IV (DOT)']].forEach(r=>{
    h+='<div class="pb-row"><span class="pb-lbl">'+r[0]+'</span><span class="pb-val">'+r[1]+'</span></div>';
  });
  h+='</div></div>';
  h+='<div class="note-card"><div class="note-title">August back-to-back</div><div class="note-body">RS eval Aug 2 → process feedback that week → PTD Aug 9 to implement. The week gap is an asset, not wasted time.</div></div>';
  el.innerHTML=h;
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  ['schedule','exercises','progress'].forEach(t=>document.getElementById('nb-'+t).classList.toggle('active',t===tab));
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='exercises'&&window.lucide)lucide.createIcons();
  document.getElementById('scrollArea').scrollTop=0;
}

let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;
  t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{t.style.transform='translateX(-50%) translateY(-70px)';},1300);
}

renderSchedule();renderExercises();renderProgress();updateHeader();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
