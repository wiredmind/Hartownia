<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Track Prep">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Track Day Prep</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: { colors: { brand: { DEFAULT: '#C8102E', light: '#fef1f3' } } } }
}
</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
body { font-family: 'Inter', system-ui, sans-serif; padding-top: env(safe-area-inset-top); }
.tab-content { display: none; }
.tab-content.active { display: block; }
.day-body { display: none; }
.day-body.open { display: block; }
.chevron { transition: transform 0.2s; }
.chevron.open { transform: rotate(180deg); }
* { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
.scroll-area { overflow-y: auto; -webkit-overflow-scrolling: touch; }
</style>
</head>
<body class="bg-gray-50 text-gray-900">
<div style="display:flex;flex-direction:column;height:100dvh">

<!-- HEADER -->
<header class="bg-white border-b border-gray-200 px-4 pt-3 pb-3 flex-shrink-0">
  <div class="flex items-center justify-between mb-2">
    <div>
      <h1 class="text-xl font-bold text-gray-900">Track Day Prep</h1>
      <p class="text-xs text-gray-400 mt-0.5">COTA 2026 · Marcin W.</p>
    </div>
    <div class="flex items-center gap-2">
      <button onclick="changeWeek(-1)" class="w-8 h-8 rounded-full border border-gray-300 text-gray-600 flex items-center justify-center text-lg leading-none">&#8249;</button>
      <span id="wkLabel" class="font-bold text-red-700 text-base min-w-[64px] text-center">Week 1</span>
      <button onclick="changeWeek(1)" class="w-8 h-8 rounded-full border border-gray-300 text-gray-600 flex items-center justify-center text-lg leading-none">&#8250;</button>
    </div>
  </div>
  <div class="flex items-center gap-2">
    <div class="flex-1 bg-gray-200 rounded-full h-2"><div id="progFill" class="bg-red-700 h-2 rounded-full transition-all" style="width:0%"></div></div>
    <span id="progPct" class="text-xs font-medium text-gray-500 w-8 text-right">0%</span>
  </div>
  <div class="flex justify-between mt-1">
    <span id="progToday" class="text-xs text-gray-400"></span>
    <span id="progPhase" class="text-xs font-semibold text-red-700"></span>
  </div>
</header>

<!-- CONTENT -->
<div class="scroll-area flex-1" id="scrollArea">
  <div id="tab-schedule" class="tab-content active" style="padding-bottom:80px"></div>
  <div id="tab-exercises" class="tab-content" style="padding-bottom:80px"></div>
  <div id="tab-progress" class="tab-content" style="padding-bottom:80px"></div>
</div>

<!-- NAV -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex z-50" style="padding-bottom:env(safe-area-inset-bottom)">
  <button id="nb-schedule" onclick="switchTab('schedule')" class="flex-1 flex flex-col items-center py-2 gap-1 text-red-700">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span class="text-xs font-medium">Schedule</span>
  </button>
  <button id="nb-exercises" onclick="switchTab('exercises')" class="flex-1 flex flex-col items-center py-2 gap-1 text-gray-400">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
    <span class="text-xs font-medium">Exercises</span>
  </button>
  <button id="nb-progress" onclick="switchTab('progress')" class="flex-1 flex flex-col items-center py-2 gap-1 text-gray-400">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span class="text-xs font-medium">Progress</span>
  </button>
</nav>
</div>

<div id="toast" style="position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-80px);background:#111;color:#fff;font-size:14px;padding:8px 18px;border-radius:999px;z-index:200;transition:transform .2s;pointer-events:none;white-space:nowrap"></div>

<script>
const DAYS = [
  { id:'mon', name:'Monday', focus:'Push · Grip · Shoulder', color:'#b91c1c',
    exercises:[
      {id:'pushups', name:'Push-ups',         rx:'3 × 10 (every other day)', note:'⚠ Left shoulder — stop at any pain. Not daily.'},
      {id:'pike',    name:'Pike Push-ups',     rx:'3 × 10', note:'Shifts load off the shoulder — safer than standard'},
      {id:'pullap',  name:'Band Pull-Aparts',  rx:'3 × 15', note:'Critical for shoulder rehab — counteracts pushing imbalance'},
      {id:'grip',    name:'Towel Hang',        rx:'3 × 30s per hand'},
      {id:'wrist',   name:'Wrist Rotations',   rx:'3 × 15 each direction'},
    ]
  },
  { id:'tue', name:'Tuesday', focus:'Legs · Neck', color:'#1d4ed8',
    exercises:[
      {id:'squat', name:'Bodyweight Squats', rx:'3 × 20'},
      {id:'wsite', name:'Wall Sit',          rx:'3 × 45s'},
      {id:'lunge', name:'Lunges',            rx:'3 × 12 per leg'},
      {id:'calf',  name:'Calf Raises',       rx:'3 × 25'},
      {id:'neck',  name:'Neck Isometrics',   rx:'3 × 10s × 4 directions', note:'Non-negotiable — the Tuono will punish a weak neck by session 3'},
    ]
  },
  { id:'wed', name:'Wednesday', focus:'Conditioning', color:'#15803d',
    exercises:[
      {id:'zone2', name:'Zone 2 Cardio', rx:'20–30 min', note:'Conversational pace. Aerobic base, not punishment.'},
      {id:'rope',  name:'Jump Rope',     rx:'15 min', note:'Alternative if you prefer'},
    ]
  },
  { id:'thu', name:'Thursday', focus:'Pull · Core', color:'#7e22ce',
    exercises:[
      {id:'pullup', name:'Pull-ups',           rx:'3 × max'},
      {id:'invrow', name:'Inverted Rows',       rx:'3 × 12', note:'Use if pull-ups are still rough'},
      {id:'facep',  name:'Face Pulls (band)',   rx:'3 × 15', note:'Builds posterior shoulder — pairs with pull-aparts'},
      {id:'plank',  name:'Plank',               rx:'3 × 45s'},
      {id:'sidepl', name:'Side Plank',          rx:'3 × 30s per side'},
      {id:'deadbg', name:'Dead Bug',            rx:'3 × 10', note:'Core stability for holding position under heavy braking'},
    ]
  },
  { id:'fri', name:'Friday', focus:'Legs · Grip · Neck', color:'#b45309',
    exercises:[
      {id:'slsqt',   name:'Single-leg Squat',  rx:'3 × 8 per leg', note:'To a chair — asymmetric strength for the pegs'},
      {id:'brdge',   name:'Glute Bridge',       rx:'3 × 15', note:'Hip stability for tank grip and body positioning'},
      {id:'farmr',   name:'Farmer Carry',       rx:'3 × 30s', note:'Grip + core at the same time'},
      {id:'pullap2', name:'Band Pull-Aparts',   rx:'3 × 15', note:'Second band session this week'},
      {id:'neck2',   name:'Neck Isometrics',    rx:'3 × 10s × 4 directions'},
    ]
  },
  { id:'sat', name:'Saturday', focus:'Long Conditioning', color:'#0369a1',
    exercises:[
      {id:'lzone2', name:'Zone 2 Cardio', rx:'30–45 min', note:'Bike preferred. Add 5 min each week. Build to 45 by week 6.'},
    ]
  },
];

const TRACK_EVENTS = [
  {date:'May 2',  label:'PTD — 1-on-1 Coaching', detail:'Give coach full context: T16–18 line, T11 brake marker, T19, drive out. This is the cornerstone day.', next:true},
  {date:'July',   label:'PTD — Consolidation',    detail:'Implement May coaching. Hunt consistency, not peak times. Gym day.', next:false},
  {date:'Aug 2',  label:'RideSmart — Eval Day',   detail:'Request eval. Arrive warmed up. This is the comp day.', next:false},
  {date:'Aug 9',  label:'PTD — Implement',        detail:'Take RS feedback, apply immediately. Back-to-back with eval week.', next:false},
];
const PHASES = ['','Build','Build','Load','Load','Peak','Peak'];

let currentWeek = parseInt(localStorage.getItem('tdp_week')||'1');

function key(w,d,e){ return 'tdp_w'+w+'_'+d+'_'+e; }
function isChecked(w,d,e){ return localStorage.getItem(key(w,d,e))==='1'; }
function setChecked(w,d,e,v){ localStorage.setItem(key(w,d,e),v?'1':'0'); }

function weekStats(w){
  let done=0,total=0;
  DAYS.forEach(d=>d.exercises.forEach(e=>{total++;if(isChecked(w,d.id,e.id))done++;}));
  return{done,total,pct:total?Math.round(done/total*100):0};
}

function updateHeader(){
  document.getElementById('wkLabel').textContent='Week '+currentWeek;
  const s=weekStats(currentWeek);
  document.getElementById('progFill').style.width=s.pct+'%';
  document.getElementById('progPct').textContent=s.pct+'%';
  const days=['sun','mon','tue','wed','thu','fri','sat'];
  const todayId=days[new Date().getDay()];
  const day=DAYS.find(d=>d.id===todayId);
  if(day){
    let done=0; day.exercises.forEach(e=>{if(isChecked(currentWeek,day.id,e.id))done++;});
    document.getElementById('progToday').textContent=done+'/'+day.exercises.length+' today ('+day.name+')';
  }
  document.getElementById('progPhase').textContent=PHASES[currentWeek]||'';
}

function changeWeek(d){
  const nw=Math.max(1,Math.min(6,currentWeek+d));
  if(nw===currentWeek)return;
  currentWeek=nw;
  localStorage.setItem('tdp_week',nw);
  renderSchedule();renderProgress();updateHeader();
}

function toggleDay(id){
  document.getElementById('body_'+id).classList.toggle('open');
  document.getElementById('chev_'+id).classList.toggle('open');
}

function toggleEx(dayId,exId){
  const was=isChecked(currentWeek,dayId,exId);
  setChecked(currentWeek,dayId,exId,!was);
  const el=document.getElementById('cb_'+dayId+'_'+exId);
  if(!was){
    el.style.background='#b91c1c';el.style.borderColor='#b91c1c';
    el.innerHTML='<svg width="14" height="14" fill="none" stroke="white" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';
  } else {
    el.style.background='';el.style.borderColor='#d1d5db';el.innerHTML='';
  }
  updateHeader();updateDayStat(dayId);
  if(!was)showToast('Done \u2713');
}

function updateDayStat(dayId){
  const day=DAYS.find(d=>d.id===dayId);
  let done=0; day.exercises.forEach(e=>{if(isChecked(currentWeek,dayId,e.id))done++;});
  const el=document.getElementById('stat_'+dayId);
  if(!el)return;
  const all=done===day.exercises.length;
  el.textContent=all?'Complete':done+'/'+day.exercises.length;
  el.style.color=all?'#16a34a':'#9ca3af';
  el.style.fontWeight=all?'600':'400';
}

function renderSchedule(){
  const el=document.getElementById('tab-schedule');
  let h='<div class="p-3 space-y-2">';
  DAYS.forEach(day=>{
    let done=0; day.exercises.forEach(e=>{if(isChecked(currentWeek,day.id,e.id))done++;});
    const all=done===day.exercises.length;
    h+='<div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">';
    h+='<button class="w-full flex items-center justify-between px-4 py-3.5 text-left" onclick="toggleDay(\''+day.id+'\')">';
    h+='<div class="flex items-center gap-3"><div class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background:'+day.color+'"></div>';
    h+='<div><div class="font-semibold text-gray-900">'+day.name+'</div><div class="text-xs text-gray-500 mt-0.5">'+day.focus+'</div></div></div>';
    h+='<div class="flex items-center gap-2.5"><span id="stat_'+day.id+'" style="font-size:12px;color:'+(all?'#16a34a':'#9ca3af')+';font-weight:'+(all?'600':'400')+'">'+(all?'Complete':done+'/'+day.exercises.length)+'</span>';
    h+='<svg id="chev_'+day.id+'" class="chevron" width="16" height="16" fill="none" stroke="#9ca3af" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div></button>';
    h+='<div id="body_'+day.id+'" class="day-body border-t border-gray-100">';
    day.exercises.forEach(ex=>{
      const checked=isChecked(currentWeek,day.id,ex.id);
      h+='<div class="flex items-start gap-3 px-4 py-3.5 border-b border-gray-50 last:border-b-0 cursor-pointer" onclick="toggleEx(\''+day.id+'\',\''+ex.id+'\')" style="background:white">';
      h+='<div id="cb_'+day.id+'_'+ex.id+'" style="width:24px;height:24px;border-radius:6px;border:2px solid '+(checked?'#b91c1c':'#d1d5db')+';background:'+(checked?'#b91c1c':'')+';flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center">';
      h+=checked?'<svg width="14" height="14" fill="none" stroke="white" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>':'';
      h+='</div><div style="flex:1"><div class="font-medium text-gray-900 text-sm">'+ex.name+'</div>';
      h+='<div class="text-sm text-gray-500 mt-0.5">'+ex.rx+'</div>';
      if(ex.note)h+='<div class="text-xs text-red-700 mt-1">'+ex.note+'</div>';
      h+='</div></div>';
    });
    h+='</div></div>';
  });
  h+='<div class="bg-white rounded-xl border border-gray-200 shadow-sm px-4 py-3.5">';
  h+='<div class="flex items-center gap-3"><div class="w-2.5 h-2.5 rounded-full bg-gray-300"></div>';
  h+='<div><div class="font-semibold text-gray-900">Sunday</div><div class="text-xs text-gray-500 mt-0.5">Rest · Light Walk</div></div></div>';
  h+='<p class="text-sm text-gray-500 mt-2 ml-5 italic leading-relaxed">Visualize T16–18 arc. Listen for the minimum speed point.<br><span class="text-gray-400">baaaaa · uuuuuuhuuu · baaaaa</span></p></div>';
  h+='<div class="rounded-xl bg-red-50 border border-red-200 px-4 py-3.5">';
  h+='<p class="text-xs font-semibold text-red-800 uppercase tracking-wide mb-2">On-Track Mental Reps</p>';
  h+='<ul class="space-y-1.5 text-sm text-red-900">';
  ['T16–18: drift first kink, commit second apex, then drive to bridge',
   'T19: refuse to brake for one full session — find out what happens',
   'T11: brake marker one bike length deeper than where you\'ve been',
   'Every corner: hear the floor — baaaaa · uuuuuuhuuu · baaaaa',
   'Drive out: load the rear, wait for the bite before full throttle'].forEach(n=>{
    h+='<li class="flex gap-2"><span class="text-red-400 flex-shrink-0">→</span><span>'+n+'</span></li>';
  });
  h+='</ul></div></div>';
  el.innerHTML=h;
}

const EX_ICONS = {
  pushups:'arrow-down-to-line', pike:'triangle', pullap:'move-horizontal',
  grip:'grip-horizontal', wrist:'rotate-cw', squat:'chevrons-down',
  wsite:'square', lunge:'footprints', calf:'arrow-up-from-line',
  neck:'shield', zone2:'heart-pulse', rope:'zap', pullup:'arrow-up-to-line',
  invrow:'flip-vertical-2', facep:'target', plank:'minus', sidepl:'align-left',
  deadbg:'bug', slsqt:'flag', brdge:'chevron-up', farmr:'briefcase',
  pullap2:'move-horizontal', neck2:'shield', lzone2:'heart-pulse',
};

function renderExercises(){
  const el=document.getElementById('tab-exercises');
  let h='<div class="p-3 space-y-4">';
  h+='<div class="bg-amber-50 border border-amber-300 rounded-xl px-4 py-3.5">';
  h+='<p class="font-semibold text-amber-900 text-sm mb-2">⚠ Shoulder Protocol</p>';
  h+='<ul class="text-sm text-amber-800 space-y-1.5 leading-snug">';
  ['Push-ups <strong>every other day maximum</strong> — not daily','Start at 3×10, not 3×max',
   'Band pull-aparts (Mon + Fri) counteract anterior dominance','Face pulls (Thu) build posterior shoulder balance',
   'Any pain = stop that session. No heroics.','Week before each track day: cut all volume 50%'].forEach(t=>{
    h+='<li class="flex gap-2"><span class="flex-shrink-0">·</span><span>'+t+'</span></li>';
  });
  h+='</ul></div>';
  DAYS.forEach(day=>{
    h+='<div><div class="flex items-center gap-2 mb-2 px-1"><div class="w-2 h-2 rounded-full" style="background:'+day.color+'"></div>';
    h+='<span class="text-xs font-semibold uppercase tracking-wider text-gray-500">'+day.name+' · '+day.focus+'</span></div>';
    h+='<div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden divide-y divide-gray-100">';
    day.exercises.forEach(ex=>{
      const icon=EX_ICONS[ex.id]||'circle';
      h+='<div class="px-4 py-3 flex items-start gap-3">';
      h+='<div class="w-8 h-8 rounded-lg bg-gray-100 flex items-center justify-center flex-shrink-0 mt-0.5">';
      h+='<i data-lucide="'+icon+'" style="width:16px;height:16px;color:#6b7280"></i></div>';
      h+='<div class="flex-1"><div class="font-medium text-gray-900 text-sm">'+ex.name+'</div>';
      h+='<div class="text-sm text-gray-500 mt-0.5">'+ex.rx+'</div>';
      if(ex.note)h+='<div class="text-xs text-gray-400 mt-1">'+ex.note+'</div>';
      h+='</div></div>';
    });
    h+='</div></div>';
  });
  h+='<div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">';
  h+='<div class="px-4 py-3 border-b border-gray-100"><p class="font-semibold text-gray-900 text-sm">6-Week Progression</p></div>';
  h+='<div class="divide-y divide-gray-50">';
  [['Weeks 1–2','Build','bg-blue-100 text-blue-700','3 sets · RPE 7 · 90s rest'],
   ['Weeks 3–4','Load','bg-amber-100 text-amber-700','4 sets · RPE 8 · 60s rest'],
   ['Weeks 5–6','Peak','bg-red-100 text-red-700','4 sets · RPE 9 · vest if available · 45s rest'],
   ['Deload','','bg-gray-100 text-gray-600','Week before each track day · 50% volume · arrive fresh']].forEach(row=>{
    h+='<div class="px-4 py-3 flex items-start justify-between gap-3">';
    h+='<div class="flex items-center gap-2 flex-shrink-0"><span class="font-medium text-sm text-gray-900">'+row[0]+'</span>';
    if(row[1])h+='<span class="text-xs px-2 py-0.5 rounded-full font-medium '+row[2]+'">'+row[1]+'</span>';
    h+='</div><span class="text-sm text-gray-500 text-right">'+row[3]+'</span></div>';
  });
  h+='</div></div></div>';
  el.innerHTML=h;
  if(window.lucide) lucide.createIcons();
}

function renderProgress(){
  const el=document.getElementById('tab-progress');
  let h='<div class="p-3 space-y-4">';
  h+='<p class="text-xs font-semibold uppercase tracking-wider text-gray-400 px-1">6-Week Overview</p>';
  h+='<div class="grid grid-cols-3 gap-2">';
  for(let w=1;w<=6;w++){
    const s=weekStats(w);const isCur=w===currentWeek;
    h+='<div class="bg-white rounded-xl border '+(isCur?'border-red-700':'border-gray-200')+' shadow-sm p-3 text-center">';
    h+='<div class="text-2xl font-bold '+(isCur?'text-red-700':'text-gray-300')+'">'+w+'</div>';
    h+='<div class="text-xs text-gray-400 mt-0.5">'+(PHASES[w]||'')+'</div>';
    h+='<div class="mt-2 bg-gray-100 rounded-full h-1.5 overflow-hidden"><div class="h-full rounded-full bg-red-700" style="width:'+s.pct+'%"></div></div>';
    h+='<div class="text-xs text-gray-400 mt-1">'+s.pct+'%</div></div>';
  }
  h+='</div>';
  h+='<div><p class="text-xs font-semibold uppercase tracking-wider text-gray-400 px-1 mb-2">Season Timeline</p>';
  h+='<div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden divide-y divide-gray-100">';
  TRACK_EVENTS.forEach(e=>{
    h+='<div class="px-4 py-3.5 flex gap-3"><div class="mt-1.5 w-2.5 h-2.5 rounded-full flex-shrink-0 '+(e.next?'bg-red-700':'bg-gray-300')+'"></div>';
    h+='<div class="flex-1"><div class="flex items-baseline justify-between gap-2">';
    h+='<span class="font-semibold text-sm text-gray-900">'+e.label+'</span>';
    h+='<span class="text-xs font-bold flex-shrink-0 '+(e.next?'text-red-700':'text-gray-400')+'">'+e.date+'</span></div>';
    h+='<p class="text-sm text-gray-500 mt-0.5 leading-snug">'+e.detail+'</p></div></div>';
  });
  h+='</div></div>';
  h+='<div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">';
  h+='<div class="px-4 py-3 border-b border-gray-100"><p class="font-semibold text-gray-900 text-sm">COTA Personal Bests</p></div>';
  h+='<div class="px-4 py-3 space-y-3">';
  [['Current PB','2:48.2','text-red-700 text-2xl font-bold font-mono'],
   ['Previous PB','2:51.3','text-gray-400 text-lg font-semibold font-mono'],
   ['Improvement','−3.1 seconds','text-green-600 text-sm font-semibold'],
   ['Group','Intermediate (6 days)','text-gray-600 text-sm'],
   ['Bike','2023 Aprilia Tuono V4','text-gray-600 text-sm'],
   ['Tires','Pirelli Diablo Corsa IV (DOT)','text-gray-600 text-sm']].forEach(row=>{
    h+='<div class="flex justify-between items-center"><span class="text-sm text-gray-500">'+row[0]+'</span><span class="'+row[2]+'">'+row[1]+'</span></div>';
  });
  h+='</div></div>';
  h+='<div class="bg-gray-50 border border-gray-200 rounded-xl px-4 py-3.5 text-sm">';
  h+='<p class="font-semibold text-gray-800 mb-1">August back-to-back</p>';
  h+='<p class="text-gray-500 leading-relaxed">RS eval Aug 2 → process feedback that week → PTD Aug 9 to implement. The week gap is an asset, not wasted time.</p></div>';
  h+='</div>';
  el.innerHTML=h;
}

function switchTab(tab){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  ['schedule','exercises','progress'].forEach(t=>{
    const b=document.getElementById('nb-'+t);
    b.style.color=t===tab?'#b91c1c':'#9ca3af';
  });
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='exercises' && window.lucide) lucide.createIcons();
  document.getElementById('scrollArea').scrollTop=0;
}

let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{t.style.transform='translateX(-50%) translateY(-80px)';},1200);
}

renderSchedule();renderExercises();renderProgress();updateHeader();
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
